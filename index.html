<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
viewport-fit=cover">

<title>ProScan AI</title>

<link rel="manifest"
href="manifest.json">

<link rel="stylesheet"
href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700&display=swap"
rel="stylesheet">

</head>

<body>

<div class="app">

    <!-- HEADER -->

    <div class="header">

        <div class="menu-btn">
            ☰
        </div>

        <div class="top-actions">

            <div class="top-btn">
                ✎
            </div>

            <div class="top-btn">
                ⋮
            </div>

        </div>

    </div>

    <!-- CAMERA -->

    <div class="camera-wrap">

        <video
        id="video"
        autoplay
        playsinline
        muted></video>

        <div class="overlay"></div>

        <div class="ai-title">

            <h1>
                Pro<span>Scan</span> AI
            </h1>

            <p>
                AI Document Scanner
            </p>

        </div>

        <!-- SCAN -->

        <div class="scan-box">

            <div class="corner tl"></div>
            <div class="corner tr"></div>
            <div class="corner bl"></div>
            <div class="corner br"></div>

            <div class="scan-line"></div>

        </div>

    </div>

    <!-- TOOLS -->

    <div class="tools">

        <div class="tool">
            <div class="tool-icon">✨</div>
            <div class="tool-name">AI</div>
        </div>

        <div class="tool">
            <div class="tool-icon">✂️</div>
            <div class="tool-name">Crop</div>
        </div>

        <div class="tool">
            <div class="tool-icon">🖨️</div>
            <div class="tool-name">PDF</div>
        </div>

        <div class="tool">
            <div class="tool-icon">☁️</div>
            <div class="tool-name">Cloud</div>
        </div>

    </div>

    <!-- PREVIEW -->

    <div class="preview">

        <div class="preview-title">
            เอกสารล่าสุด
        </div>

        <div class="preview-card">

            <img
            id="previewImage"
            src="https://dummyimage.com/700x900/1e293b/ffffff&text=Document+Preview">

        </div>

    </div>

    <!-- CAPTURE -->

    <div class="capture-wrap">

        <button
        class="capture-btn"
        onclick="captureImage()"></button>

    </div>

    <!-- NAV -->

    <div class="bottom-nav">

        <div class="nav-item active">
            <div class="nav-icon">📄</div>
            Scan
        </div>

        <div class="nav-item">
            <div class="nav-icon">📂</div>
            Files
        </div>

        <div class="nav-item">
            <div class="nav-icon">⚙️</div>
            Settings
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
